<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Insider Threat Story Training</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- Mode Selection Menu -->
  <div id="modeMenu">
    <div id="modeBox">
      <h1>Insider Threat Training</h1>
      <p>Select a mode to begin</p>

      <button id="singlePlayerBtn">Single Player</button>
      <button id="multiPlayerBtn">Multiplayer</button>

      <div id="multiplayerOptions" class="hidden">
        <button id="createRoomBtn">Create Room</button>
        <input id="roomCodeInput" type="text" placeholder="Enter room code">
        <button id="joinRoomBtn">Join Room</button>
      </div>
    </div>
  </div>

  <div id="game">
    <img id="bg" class="fade-in">

    <img id="leftChar" class="portrait hidden">
    <img id="rightChar" class="portrait hidden">

    <div id="multiplayerHud" class="hidden">
      <div id="multiplayerRoom"></div>
      <div id="multiplayerRole"></div>
      <div id="multiplayerStatus"></div>
    </div>

    <div id="scoreBar">
      <span>Security Health</span>
      <div id="scoreFill"></div>
    </div>

    <div id="dialogueBox">
      <div id="name"></div>
      <div id="role"></div>
      <div id="roleHint" class="hidden"></div>
      <div id="text"></div>
      <div id="feedback"></div>
      <div id="choices"></div>
    </div>

    <!-- Result overlay -->
    <div id="resultOverlay">
      <div id="resultBox">
        <h1 id="resultTitle"></h1>
        <p id="resultText"></p>
        <button id="resultContinue">Continue</button>
      </div>
    </div>

    <!-- Game over overlay -->
    <div id="gameOverOverlay">
      <h1>SECURITY BREACH</h1>
      <p>Your security health reached zero. A critical insider threat incident has occurred.</p>
      <button id="restartBtn">Restart Training</button>
    </div>

    <!-- Summary Screen -->
    <div id="summaryOverlay">
      <div id="summaryBox">
        <h1>Training Summary</h1>

        <div id="summaryContent">
          <p id="summaryHealth"></p>
          <p id="summaryCorrect"></p>
          <p id="summaryIncorrect"></p>
          <p id="summaryHotspots"></p>
          <p id="summaryPhishing"></p>
          <h3 id="summaryGrade"></h3>
          <h3 id="summaryBadge"></h3>
          <p id="summaryAdvice"></p>
        </div>

        <button id="summaryRestart">Restart Training</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/scenes.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/multiplayer.js"></script>
  <script src="js/engine.js"></script>

</body>
</html>
